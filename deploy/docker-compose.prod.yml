services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - appnet

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom_commerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    networks:
      - appnet

  api:
    image: ghcr.io/${GHCR_OWNER}/ecom-api:latest
    env_file:
      - ./.env
    environment:
      PORT: ${API_PORT:-9000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - appnet

  client:
    image: ghcr.io/${GHCR_OWNER}/ecom-client:latest
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
