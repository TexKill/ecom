services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - appnet

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      PORT: ${API_PORT:-9000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${API_PORT:-9000}:${API_PORT:-9000}"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - appnet

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-9000}}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-9000}}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
